name: CI

on:
    pull_request:
    push:
        branches:
            - main

jobs:
    validate:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm
            - run: npm ci
            - run: npm run lint
            # Skip integration tests because they need external env/secrets and may cost money
            # can be run locally with `npm run test:integration` with your own env variables
            - run: npm test -- --testPathIgnorePatterns=/tests/integration/
            - run: npm run build
